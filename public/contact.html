<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>contact - zzzkan.me</title>
    <meta name="description" content="zzzkan.meの問い合わせフォームです。" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text x=%2250%%22 y=%2250%%22 style=%22dominant-baseline:central;text-anchor:middle;font-size:90px;%22>😴</text></svg>"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="wrapper">
      <h1>Contact</h1>
      <form data-static-form-name="contact">
        <label for="name">Name: </label>
        <input type="text" name="name" placeholder="zzzkan" required />
        <label for="email">Email: </label>
        <input
          type="email"
          name="email"
          placeholder="zzzkan@example.com"
          required
        />
        <label for="message">Message: </label>
        <textarea name="message" aria-label="コメントフィールド"></textarea>
        <button type="submit">Send</button>
      </form>
      <p>
        このフォームは Cloudflare Pages Functions + MailChannels
        で作られています（<a
          href="https://blog.zzzkan.me/cloudflare-email-form/"
          >Cloudflareはメールアドレスからフォームまで無料で簡単に作れて便利</a
        >）。
      </p>
      <p><a href="/">Homeへ戻る</a></p>
    </div>
  </body>
</html>
